<!DOCTYPE html> <!--defines this as an html document for the browser to render in html5 -->
<html lang="en"> <!--defines the language for the entire webpage as english -->
<head> <!--the header / start of the actual document -->
    <meta charset="UTF-8"> <!--says to use UTF-8 universal characters -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--makes it work for both monitors and mobile devices by scaling width to the physical screen width -->
    <title>Arithmos Machine Interface</title> <!--Title for the webpage -->
    <link rel="stylesheet" href="style.css"> <!--likes to style.css to pull the styling layout and colors and stuff -->
</head> <!--closes the header tag for the webpage -->
<body> <!--opens the main body of the document -->
    <p style="text-align: center; color: #666; font-size: 14px; margin-top: 20px; position: absolute; top: 10px; width: 100%;">
    The source code for this webpage can be found at: 
    <a href="https://github.com/A1101C/Arithmos-Machine" target="_blank" style="color: #007bff; text-decoration: none;">
        https://github.com/A1101C/Arithmos-Machine
    </a>
</p>
    <div class="container"> <!--gathers UI components from style.css and centers a box on screen -->
        <h1>Arithmos Math Engine</h1> <!--displays the heading at the top of the card -->
        <p>Enter a mathematical expression to evaluate (e.g., <code>3+5*2</code>):</p> <!--prints the explanation for how to use the box-->
        <p>Enter a function of x and its bounds to evaluate (e.g., <code>12x^2+3x-5</code>) with the Min Max and Steps values:</p> <!--prints the explanation for how to use the box-->
        
        <div class="input-group"> <!--an inner structure to capture the user input -->
            <input type="text" id="expressionInput" placeholder="Type expression here..." autocomplete="off"> <!--makes a text box with grey text saying to type expression here with no autocomplete -->
            <button id="evaluateBtn">Evaluate</button> <!--gives a button to evaluate the expression -->
        </div> <!-- closes the input section of the document -->

        <div class="graph-inputs"> <!-- a separate container specifically for inputs related to graphing (xMin, xMax, steps) -->
            <input type="text" id="xMinInput" placeholder="xMin (e.g. 0)" autocomplete="off"> <!-- input field for the starting boundary of the graph's x-axis -->
            <input type="text" id="xMaxInput" placeholder="xMax (e.g. 10)" autocomplete="off"> <!-- input field for the ending boundary of the graph's x-axis -->
            <input type="text" id="xCountInput" placeholder="Steps (e.g. 5)" autocomplete="off"> <!-- input field determining how many data points or steps the calculation should cover -->
        </div> <!-- closes the graph input container -->


        <div id="resultContainer" class="result-box hidden"> <!--makes a box to hold the result -->
            <h3>Result:</h3> <!--the calculated result will appear -->
            <p id="resultText"></p> <!--final numerical answer -->
            <div id="tableContainer"></div> <!-- container intended to hold graph points -->
        </div> <!-- closes the result container box -->

    <script src="script.js"></script> <!--hooks into script.js to run the calculation with the c++ binary -->
</body> <!--closes the body -->
</html> <!--closes the whole document -->
